services:
  mongodb:
    image: mongo:latest
    container_name: devopsproject-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: devopsproject
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: devopsproject-app
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      NODE_ENV: development
      MONGO_URL: mongodb://mongodb:27017/devopsproject
      PORT: 8080
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-session-secret}
      IMAGEKIT_PRIVATE_KEY: ${IMAGEKIT_PRIVATE_KEY:-your-imagekit-private-key}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mongodb_data:
  mongodb_config:
